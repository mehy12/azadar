<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Majlis-e-Aza · Anjuman-e-Imamia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0c0b0d;
      --surface: #17151a;
      --surface-2: #211e24;
      --line: rgba(243, 238, 228, 0.09);
      --line-strong: rgba(243, 238, 228, 0.16);
      --text: #f3eee4;
      --text-dim: #a89f93;
      --text-faint: #6c655d;
      --gold: #c9a24d;
      --gold-soft: rgba(201, 162, 77, 0.14);
      --gold-line: rgba(201, 162, 77, 0.45);
      --maroon: #9c2a37;
      --maroon-soft: rgba(156, 42, 55, 0.20);
      --maroon-line: rgba(156, 42, 55, 0.55);
      --radius-lg: 18px;
      --radius-md: 13px;
      --radius-sm: 9px;
      --font-display: 'Fraunces', serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background:
        radial-gradient(800px 320px at 50% -80px, rgba(201, 162, 77, 0.07), transparent 60%),
        var(--bg);
      padding-bottom: 92px;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    /* ---------- header ---------- */
    header.top {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(12, 11, 13, 0.86);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 18px 20px 14px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin: 0 0 4px;
    }

    h1.title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 25px;
      margin: 0;
      letter-spacing: 0.01em;
      line-height: 1.15;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 12.5px;
      margin-top: 3px;
    }

    .today-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .today-date {
      font-size: 12.5px;
      color: var(--text-dim);
    }

    .today-date b {
      color: var(--text);
      font-weight: 600;
    }

    .live-pill {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--gold-soft);
      border: 1px solid var(--gold-line);
      color: var(--gold);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 5px 10px 5px 8px;
      border-radius: 99px;
      cursor: pointer;
    }

    .live-pill.show {
      display: inline-flex;
    }

    .dot-pulse {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(201, 162, 77, 0.55);
      }

      50% {
        box-shadow: 0 0 0 5px rgba(201, 162, 77, 0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot-pulse {
        animation: none;
      }
    }

    /* ---------- day rail ---------- */
    .day-rail {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 20px 14px;
      border-bottom: 1px solid var(--line);
      scrollbar-width: none;
    }

    .day-rail::-webkit-scrollbar {
      display: none;
    }

    .day-chip {
      flex: 0 0 auto;
      min-width: 46px;
      padding: 7px 6px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--surface);
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .day-chip .n {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      line-height: 1;
    }

    .day-chip .wd {
      font-size: 9.5px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-top: 3px;
    }

    .day-chip.active {
      background: var(--gold-soft);
      border-color: var(--gold-line);
    }

    .day-chip.active .n {
      color: var(--gold);
    }

    .day-chip.ashura {
      border-color: var(--maroon-line);
    }

    .day-chip.ashura .n {
      color: #d98e96;
    }

    .day-chip.ashura.active {
      background: var(--maroon-soft);
    }

    .day-chip.today-marker {
      position: relative;
    }

    .day-chip.today-marker::after {
      content: '';
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold);
    }

    /* ---------- sections ---------- */
    main {
      padding: 18px 20px 8px;
    }

    .section {
      margin-bottom: 22px;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }

    .section-head .label {
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-faint);
      font-weight: 700;
    }

    .section-head.live .label {
      color: var(--gold);
    }

    .section-head .rule {
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .day-banner {
      font-family: var(--font-display);
      font-size: 19px;
      margin: 2px 0 16px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .day-banner .tag {
      font-family: var(--font-body);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--maroon-line);
      background: var(--maroon-soft);
      border: 1px solid var(--maroon-line);
      padding: 3px 8px;
      border-radius: 99px;
    }

    /* ---------- majlis card ---------- */
    .card {
      display: flex;
      gap: 13px;
      align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 13px 14px;
      margin-bottom: 9px;
      cursor: pointer;
      position: relative;
      transition: border-color .15s, transform .1s;
    }

    .card:active {
      transform: scale(0.992);
    }

    .card.is-past {
      opacity: 0.55;
      background: rgba(23, 21, 26, 0.4);
      border-color: rgba(243, 238, 228, 0.04);
    }

    .card.is-past .spine {
      background: var(--text-faint) !important;
      opacity: 0.5;
    }

    .card.is-past .time-block .t,
    .card.is-past .venue-name {
      color: var(--text-dim);
    }

    .card.is-past .minjanib {
      color: var(--text-faint);
    }

    .card .past-card-tag {
      color: var(--text-dim);
      border-color: var(--line-strong);
      background: rgba(243, 238, 228, 0.05);
      font-weight: 500;
    }

    .card .spine {
      width: 3px;
      align-self: stretch;
      border-radius: 2px;
      background: var(--line-strong);
      flex: 0 0 auto;
    }

    .card.is-live .spine {
      background: var(--gold);
    }

    .card.ashura-card .spine {
      background: var(--maroon);
    }

    .card .time-block {
      flex: 0 0 64px;
      padding-top: 1px;
    }

    .card .time-block .t {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 15px;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }

    .card .time-block .ampm {
      font-size: 10px;
      color: var(--text-faint);
    }

    .card .info {
      flex: 1;
      min-width: 0;
    }

    .card .venue-name {
      font-weight: 600;
      font-size: 14.5px;
      line-height: 1.3;
    }

    .card .minjanib {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 3px;
      line-height: 1.4;
    }

    .card .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }

    .card .tag {
      font-size: 10px;
      color: var(--text-dim);
      background: var(--surface-2);
      border: 1px solid var(--line);
      padding: 2px 7px;
      border-radius: 99px;
    }

    .card .live-tag {
      color: var(--gold);
      border-color: var(--gold-line);
      background: var(--gold-soft);
      font-weight: 700;
      letter-spacing: .04em;
    }

    .card .chev {
      flex: 0 0 auto;
      color: var(--text-faint);
      align-self: center;
    }

    .empty-state {
      text-align: center;
      padding: 34px 18px;
      color: var(--text-faint);
      border: 1px dashed var(--line);
      border-radius: var(--radius-md);
      font-size: 13px;
    }

    .empty-state .ic {
      margin-bottom: 8px;
      opacity: .6;
    }

    /* ---------- venues tab ---------- */
    .zone-rail {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 16px;
      scrollbar-width: none;
    }

    .zone-rail::-webkit-scrollbar {
      display: none;
    }

    .zone-chip {
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 13px;
      border-radius: 99px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
    }

    .zone-chip.active {
      background: var(--gold-soft);
      border-color: var(--gold-line);
      color: var(--gold);
    }

    .venue-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 9px;
      cursor: pointer;
    }

    .venue-icon {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
    }

    .venue-row .info {
      flex: 1;
      min-width: 0;
    }

    .venue-row .vn {
      font-weight: 600;
      font-size: 14px;
    }

    .venue-row .va {
      font-size: 11.5px;
      color: var(--text-faint);
      margin-top: 2px;
    }

    .venue-row .vc {
      font-size: 10.5px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ---------- bottom nav ---------- */
    nav.bottom {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: rgba(17, 15, 18, 0.92);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--line);
      display: flex;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      z-index: 30;
    }

    nav.bottom button {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-faint);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-family: var(--font-body);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .03em;
      padding: 6px 0;
      cursor: pointer;
    }

    nav.bottom button.active {
      color: var(--gold);
    }

    /* ---------- sheet ---------- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 4, 5, 0.65);
      opacity: 0;
      visibility: hidden;
      transition: opacity .22s ease;
      z-index: 40;
    }

    .overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translate(-50%, 100%);
      width: 100%;
      max-width: 480px;
      max-height: 88vh;
      overflow-y: auto;
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid var(--line-strong);
      transition: transform .26s cubic-bezier(.2, .8, .3, 1);
      z-index: 41;
      -webkit-overflow-scrolling: touch;
    }

    .sheet.open {
      transform: translate(-50%, 0);
    }

    .sheet-banner {
      height: 168px;
      position: relative;
      background: linear-gradient(155deg, var(--maroon-soft), var(--bg) 75%);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px 22px 0 0;
    }

    .sheet-banner .big-icon {
      color: var(--gold);
      opacity: .9;
    }

    .sheet-banner .photo-tag {
      position: absolute;
      left: 16px;
      bottom: 12px;
      font-size: 10px;
      color: var(--text-faint);
      background: rgba(0, 0, 0, 0.4);
      padding: 3px 8px;
      border-radius: 99px;
      letter-spacing: .03em;
    }

    .sheet-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid var(--line-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      cursor: pointer;
    }

    .sheet-body {
      padding: 18px 20px 26px;
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--line-strong);
      border-radius: 99px;
      margin: 9px auto 0;
    }

    .sheet-eyebrow {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: .1em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .sheet h2 {
      font-family: var(--font-display);
      font-size: 21px;
      font-weight: 600;
      margin: 5px 0 3px;
      line-height: 1.25;
    }

    .sheet .loc {
      font-size: 12.5px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .meta-box {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }

    .meta-box .k {
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 3px;
    }

    .meta-box .v {
      font-size: 13.5px;
      font-weight: 600;
    }

    .meta-full {
      grid-column: 1 / -1;
    }

    .notes-box {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.55;
      margin-bottom: 18px;
      padding-left: 12px;
      border-left: 2px solid var(--gold-line);
    }

    .cta-row {
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 13px 12px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 13.5px;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--gold);
      color: #1a1408;
    }

    .btn-secondary {
      background: transparent;
      border-color: var(--line-strong);
      color: var(--text);
    }

    .sheet hr.div {
      border: none;
      border-top: 1px solid var(--line);
      margin: 20px 0 14px;
    }

    .mini-label {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-faint);
      font-weight: 700;
      margin-bottom: 10px;
    }

    /* ---------- past majlises collapsible section ---------- */
    .past-section {
      margin-top: 24px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .past-header {
      width: 100%;
      background: none;
      border: none;
      padding: 8px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
    }

    .past-header:hover {
      color: var(--text);
    }

    .past-header .label {
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-faint);
      font-weight: 700;
      margin: 0;
    }

    .past-header:hover .label {
      color: var(--text-dim);
    }

    .past-badge {
      font-size: 10px;
      color: var(--text-dim);
      background: var(--surface-2);
      border: 1px solid var(--line);
      padding: 2px 8px;
      border-radius: 99px;
      margin-left: auto;
      margin-right: 12px;
    }

    .past-chevron {
      color: var(--text-faint);
      transition: transform 0.2s ease;
      display: flex;
      align-items: center;
    }

    .past-section.expanded .past-chevron {
      transform: rotate(180deg);
    }

    .past-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 0;
    }

    .past-section.expanded .past-content {
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <div class="app" id="app">

    <header class="top">
      <p class="eyebrow">Anjuman-e-Imamia · Richmond Town</p>
      <h1 class="title">Majlis-e-Aza</h1>
      <p class="subtitle">Moharram-ul-Haraam 1448 AH · Bengaluru</p>
      <div class="today-row">
        <div class="today-date" id="todayDate">—</div>
        <div class="live-pill" id="livePill"><span class="dot-pulse"></span><span id="liveCount">0</span> LIVE NOW</div>
      </div>
    </header>

    <div class="day-rail" id="dayRail"></div>

    <main id="homeView"></main>
    <main id="venuesView" style="display:none;"></main>

    <nav class="bottom">
      <button id="tabHomeBtn" class="active" onclick="switchTab('home')">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 11.5 12 4l9 7.5" />
          <path d="M5.5 10v9a1 1 0 0 0 1 1H10v-6h4v6h3.5a1 1 0 0 0 1-1v-9" />
        </svg>
        Home
      </button>
      <button id="tabVenuesBtn" onclick="switchTab('venues')">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 10c0 5.5-8 12-8 12s-8-6.5-8-12a8 8 0 0 1 16 0Z" />
          <circle cx="12" cy="10" r="2.6" />
        </svg>
        Venues
      </button>
    </nav>

    <div class="overlay" id="overlay" onclick="closeSheet()"></div>
    <div class="sheet" id="sheet">
      <div class="sheet-handle"></div>
      <div id="sheetContent"></div>
    </div>

    function todayISO() {

      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function isDateInPast(dateIso) {
      if (!dateIso) return false;
      return dateIso < todayISO();
    }
    function isDateToday(dateIso) {
      if (!dateIso) return false;
      return dateIso === todayISO();
    }
    function isDateInFuture(dateIso) {
      if (!dateIso) return false;
      return dateIso > todayISO();
    }

    function eventDateTime(ev, viewDayNum) {
      // Returns a Date object for this event as it occurs on viewDayNum, or null if no clean time
      if (!ev.time_24h) return null;
      const day = daysByNum[viewDayNum];
      if (!day) return null;
      const [h, m] = ev.time_24h.split(':').map(Number);
      const d = new Date(day.date_iso + 'T00:00:00');
      d.setHours(h, m, 0, 0);
      return d;
    }
    function getStatus(ev, viewDayNum) {
      const day = daysByNum[viewDayNum];
      if (!day || !day.date_iso) return 'plain';

      const dateIso = day.date_iso;
      if (isDateInPast(dateIso)) {
        return 'past';
      }
      if (isDateInFuture(dateIso)) {
        return 'upcoming';
      }

      // It is today!
      const dt = eventDateTime(ev, viewDayNum);
      if (!dt) return 'flexible';
      const now = new Date();
      const end = new Date(dt.getTime() + 90 * 60000);
      if (now < dt) return 'upcoming';
      if (now >= dt && now <= end) return 'live';
      return 'past';
    }
    function eventsForDay(dayNum) {
      return DATA.events.filter(e => e.day_numbers && e.day_numbers.includes(dayNum));
    }
    function sortForDisplay(events, dayNum) {
      return [...events].sort((a, b) => {
        if (a.time_24h && b.time_24h) return a.time_24h.localeCompare(b.time_24h);
        if (a.time_24h) return -1;
        if (b.time_24h) return 1;
        return 0;
      });
    }

      if (activeChip) activeChip.scrollIntoView({ inline: 'center', block: 'nearest' });

      opts = opts || {};

      const status = opts.status || 'plain';
      const cls = ['card'];
      if (status === 'live') cls.push('is-live');
      if (status === 'past') cls.push('is-past');
      if (ev.date_label && ev.date_label.toLowerCase().includes('ashoor') || venue.id === 'shia-qabrastan') cls.push('ashura-card');

      const tags = [];
      if (ev.notes) tags.push(ev.notes.split(';')[0].slice(0, 42));
      if (ev.location_detail) tags.push(ev.location_detail.split(',')[0]);

      let tagsHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');

      document.getElementById('venuesView').innerHTML = html;
    }
    function selectZone(z) { state.zone = z; renderVenues(); }

    /* ---------------- tabs ---------------- */
    function switchTab(tab) {
      state.tab = tab;
      document.getElementById('homeView').style.display = tab === 'home' ? 'block' : 'none';
      document.getElementById('venuesView').style.display = tab === 'venues' ? 'block' : 'none';
      document.getElementById('tabHomeBtn').classList.toggle('active', tab === 'home');
      document.getElementById('tabVenuesBtn').classList.toggle('active', tab === 'venues');
      if (tab === 'venues') renderVenues();
    }

    /* ---------------- sheets ---------------- */
    function openSheetRaw(html) {
      document.getElementById('sheetContent').innerHTML = html;
      document.getElementById('overlay').classList.add('open');
      document.getElementById('sheet').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeSheet() {
      document.getElementById('overlay').classList.remove('open');
      document.getElementById('sheet').classList.remove('open');
      document.body.style.overflow = '';
    }

    function ctaRow(venue, ev) {
      const dir = `<a class="btn btn-primary" href="${mapsLink(venue)}" target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-7-7 18-2.5-7.5L3 11Z"/></svg>
    Get Directions</a>`;
      const yt = (ev && ev.youtube_url) ? `<a class="btn btn-secondary" href="${ev.youtube_url}" target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m10 8 5 4-5 4V8Z"/><rect x="3" y="5" width="18" height="14" rx="3"/></svg>
    Watch Live</a>` : '';
      return `<div class="cta-row">${dir}${yt}</div>`;
    }

    function openEventSheet(eventId, dayNum) {
      const ev = DATA.events.find(e => e.id === eventId);
      const venue = venuesById[ev.venue_id];
      const status = getStatus(ev, dayNum);
      const day = daysByNum[dayNum];
      const dateLabel = new Date(day.date_iso + 'T00:00:00').toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });

      const html = `
    <div class="sheet-banner">
      <div class="big-icon">${ICONS[venue.type] || ICONS.azakhana}</div>
      <div class="sheet-close" onclick="closeSheet()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 6 12 12M18 6 6 18"/></svg></div>
      <div class="photo-tag">Photo coming soon</div>
    </div>
    <div class="sheet-body">
      <p class="sheet-eyebrow">${status === 'live' ? '● Live Now' : (day.day === 0 ? 'Chand Raat' : day.day + ' Moharram')}</p>
      <h2>${venue.name}</h2>
      <p class="loc">${venue.area}${ev.location_detail ? ' · ' + ev.location_detail : ''}</p>
      <div class="meta-grid">
        <div class="meta-box"><div class="k">Date</div><div class="v">${dateLabel}</div></div>
        <div class="meta-box"><div class="k">Time</div><div class="v">${ev.time}</div></div>
        ${ev.minjanib ? `<div class="meta-box meta-full"><div class="k">Minjanib</div><div class="v">${ev.minjanib}</div></div>` : ''}
        ${ev.bayan_by ? `<div class="meta-box meta-full"><div class="k">Bayan by</div><div class="v">${ev.bayan_by}</div></div>` : ''}
      </div>
      ${ev.notes ? `<div class="notes-box">${ev.notes}</div>` : ''}
      ${ctaRow(venue, ev)}
      <hr class="div">
      <p class="mini-label">Other majlis at this venue</p>
      ${venueMiniList(venue.id, ev.id)}
    </div>
  `;
      openSheetRaw(html);
    }

    function venueMiniList(venueId, excludeId) {
      const evs = DATA.events.filter(e => e.venue_id === venueId && e.id !== excludeId).slice(0, 6);
      if (!evs.length) return `<div class="empty-state" style="padding:18px;">No other majlis listed yet.</div>`;
      return evs.map(e => {
        const d = e.day_numbers[0];
        const dayInfo = daysByNum[d] || { label: d, day: d };
        const status = getStatus(e, d);
        const cls = ['card'];
        if (status === 'live') cls.push('is-live');
        if (status === 'past') cls.push('is-past');

        const tags = [];
        if (status === 'live') tags.push('<span class="tag live-tag">● Live now</span>');
        if (status === 'past') tags.push('<span class="tag past-card-tag">✓ Completed</span>');

        return `<div class="card ${cls.slice(1).join(' ')}" style="margin-bottom:7px;" onclick="openEventSheet('${e.id}', ${d})">
      <div class="spine"></div>
      <div class="time-block"><div class="t">${e.time.split(' ')[0]}</div><div class="ampm">${e.time.split(' ')[1] || ''}</div></div>
      <div class="info">
        <div class="venue-name" style="font-size:13px;">${dayInfo.day === 0 ? 'Chand Raat' : dayInfo.label + ' Moharram'}</div>
        ${e.minjanib ? `<div class="minjanib">${e.minjanib}</div>` : ''}
        ${tags.length ? `<div class="tags" style="margin-top:5px;">${tags.join('')}</div>` : ''}
      </div>
    </div>`;
      }).join('');
    }

    function openVenueSheet(venueId) {
      const venue = venuesById[venueId];
      const evs = sortForDisplay(DATA.events.filter(e => e.venue_id === venueId), null);
      const html = `
    <div class="sheet-banner">
      <div class="big-icon">${ICONS[venue.type] || ICONS.azakhana}</div>
      <div class="sheet-close" onclick="closeSheet()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 6 12 12M18 6 6 18"/></svg></div>
      <div class="photo-tag">Photo coming soon</div>
    </div>
    <div class="sheet-body">
      <p class="sheet-eyebrow">${venue.zone}</p>
      <h2>${venue.name}</h2>
      <p class="loc">${venue.area}</p>
      ${ctaRow(venue, null)}
      <hr class="div">
      <p class="mini-label">Full schedule this Moharram (${evs.length})</p>
      ${evs.map(e => {
        const d = e.day_numbers[0];
        const dayInfo = daysByNum[d] || { label: d, day: d };
        const status = getStatus(e, d);
        const cls = ['card'];
        if (status === 'live') cls.push('is-live');
        if (status === 'past') cls.push('is-past');

        const tags = [];
        if (status === 'live') tags.push('<span class="tag live-tag">● Live now</span>');
        if (status === 'past') tags.push('<span class="tag past-card-tag">✓ Completed</span>');

        return `<div class="card ${cls.slice(1).join(' ')}" style="margin-bottom:7px;" onclick="openEventSheet('${e.id}', ${d})">
          <div class="spine"></div>
          <div class="time-block"><div class="t">${e.time.split(' ')[0]}</div><div class="ampm">${e.time.split(' ')[1] || ''}</div></div>
          <div class="info">
            <div class="venue-name" style="font-size:13px;">${dayInfo.day === 0 ? 'Chand Raat' : dayInfo.label + ' Moharram'}${e.location_detail ? ' · ' + e.location_detail.split(',')[0] : ''}</div>
            ${e.minjanib ? `<div class="minjanib">${e.minjanib}</div>` : ''}
            ${tags.length ? `<div class="tags" style="margin-top:5px;">${tags.join('')}</div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
      openSheetRaw(html);
    }

    /* ---------------- init ---------------- */
    function updateTodayBanner() {
      const day = daysByNum[TODAY_DAY_NUM];
      const d = new Date();
      const greg = d.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
      document.getElementById('todayDate').innerHTML = `<b>${day.day === 0 ? 'Chand Raat' : day.day + ' Moharram'}</b> · ${greg}`;
    }

    function init() {
      updateTodayBanner();
      renderDayRail();
      renderHome();
      setInterval(() => { if (state.tab === 'home') renderHome(); }, 30000);
    }
    init();
  </script>
</body>

</html>
